# Render Blueprint for the compute service (server/http.ts) — the piece that
# serves every /functions/v1/* call, including PDF rendering via Chromium.
# See docs/12-vercel-supabase-setup.md §2 for the full walkthrough.
#
# Deploy: Render dashboard → New → Blueprint → pick this repo. Render reads this
# file, builds server/Dockerfile, and prompts for the secret env values below.
services:
  - type: web
    name: exitblueprint-functions
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    # Headless Chromium (PDF export) wants ~1GB+; standard (2GB) is the safe
    # default. Drop to "starter" (512MB) only if you won't generate PDFs — it
    # can OOM the Chromium path. Note: free/idle instances cold-start on request.
    plan: standard
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Service-role Postgres string (bypasses RLS). MUST be the Supabase SESSION
      # pooler (postgres.<ref>@aws-0-<region>.pooler.supabase.com:5432) — it is
      # IPv4. Do NOT use the direct connection (db.<ref>.supabase.co:5432): it is
      # IPv6-only and Render has no outbound IPv6, so every DB call fails with
      # `connect ENETUNREACH` and DB-backed routes (webhook, functions) 5xx.
      - key: DATABASE_URL
        sync: false
      # Token verification. Clerk is the standard identity provider, so CLERK_JWKS_URL
      # below is what verifies production session tokens (docs/30). SUPABASE_URL /
      # FUNCTIONS_JWT_SECRET remain optional for non-Clerk token verification (e.g. a
      # legacy check during rotation); leave unset on the Clerk stack.
      - key: SUPABASE_URL
        sync: false
      - key: FUNCTIONS_JWT_SECRET
        sync: false
      # CORS allow-list — the deployed frontend origin (no trailing slash). This
      # is the go-live domain from docs/29; change it if the app moves.
      - key: FUNCTIONS_ALLOWED_ORIGIN
        value: https://app.exitblueprint.net
      # Document encryption at rest. REQUIRED in production — without it uploaded
      # client documents fall back to a publicly-known dev key. Generate with:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: EB_DOCUMENT_KEY
        sync: false
      # Clerk (standard identity provider, docs/30). CLERK_JWKS_URL verifies Clerk
      # session tokens; it's the public Clerk domain for exitblueprint.net, so it's
      # pinned here (not a secret). CLERK_SECRET_KEY (sk_...) enables Clerk owner
      # organization invitations from the advisor UI (server/invite.ts).
      - key: CLERK_JWKS_URL
        value: https://clerk.exitblueprint.net/.well-known/jwks.json
      - key: CLERK_SECRET_KEY
        sync: false
      # Svix signing secret (whsec_...) for the Clerk webhook. Enables
      # POST /webhooks/clerk, which auto-provisions firms/advisors/owners on Clerk
      # events (docs/30 §5). Point the Clerk dashboard webhook at
      # https://api.exitblueprint.net/webhooks/clerk and paste its secret here.
      - key: CLERK_WEBHOOK_SIGNING_SECRET
        sync: false
      # Optional: turns on real Claude narrative in reports. Omit to ship without it.
      - key: ANTHROPIC_API_KEY
        sync: false
