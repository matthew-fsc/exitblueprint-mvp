# Render Blueprint for the compute service (server/http.ts) — the piece that
# serves every /functions/v1/* call, including PDF rendering via Chromium.
# See docs/archive/12-vercel-supabase-setup.md §2 for the full walkthrough.
#
# Deploy: Render dashboard → New → Blueprint → pick this repo. Render reads this
# file, builds server/Dockerfile, and prompts for the secret env values below.
services:
  - type: web
    name: exitblueprint-functions
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    # Headless Chromium (PDF export) wants ~1GB+; standard (2GB) is the safe
    # default. Drop to "starter" (512MB) only if you won't generate PDFs — it
    # can OOM the Chromium path. Note: free/idle instances cold-start on request.
    plan: standard
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Service-role Postgres string (bypasses RLS). MUST be the Supabase SESSION
      # pooler (postgres.<ref>@aws-0-<region>.pooler.supabase.com:5432) — it is
      # IPv4. Do NOT use the direct connection (db.<ref>.supabase.co:5432): it is
      # IPv6-only and Render has no outbound IPv6, so every DB call fails with
      # `connect ENETUNREACH` and DB-backed routes (webhook, functions) 5xx.
      - key: DATABASE_URL
        sync: false
      # Optional: PEM of the Supabase CA cert (dashboard → Database → SSL
      # configuration). Set it to verify the DB server certificate (verify-full).
      # Unset → the pooler connection is still TLS-encrypted but unverified (the
      # pooler cert chains to Supabase's private CA, not Node's trust store).
      - key: DATABASE_CA_CERT
        sync: false
      # Token verification. Clerk is the standard identity provider, so CLERK_JWKS_URL
      # below is what verifies production session tokens (docs/30). SUPABASE_URL /
      # FUNCTIONS_JWT_SECRET remain optional for non-Clerk token verification (e.g. a
      # legacy check during rotation); leave unset on the Clerk stack.
      - key: SUPABASE_URL
        sync: false
      - key: FUNCTIONS_JWT_SECRET
        sync: false
      # CORS allow-list — the deployed frontend origin (no trailing slash). This
      # is the go-live domain from docs/29; change it if the app moves.
      - key: FUNCTIONS_ALLOWED_ORIGIN
        value: https://app.exitblueprint.net
      # Document encryption at rest. REQUIRED in production — without it uploaded
      # client documents fall back to a publicly-known dev key. Generate with:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: EB_DOCUMENT_KEY
        sync: false
      # Signing key for the short-expiry document download URLs (HMAC over
      # documentId+expiry, server/documents/signed-url.ts). REQUIRED in production:
      # the server hard-fails at startup (server/http.ts) if it's unset, because a
      # missing key would fall back to a publicly-known dev secret that makes
      # download tokens forgeable. Unlike EB_DOCUMENT_KEY it signs only ephemeral
      # (5-min) tokens, so Render can auto-generate a strong value — no manual step,
      # and rotating it only invalidates in-flight download links.
      - key: EB_SIGNING_KEY
        generateValue: true
      # Clerk (standard identity provider, docs/30). CLERK_JWKS_URL verifies Clerk
      # session tokens; it's the public Clerk domain for exitblueprint.net, so it's
      # pinned here (not a secret). CLERK_SECRET_KEY (sk_...) enables Clerk owner
      # organization invitations from the advisor UI (server/invite.ts).
      - key: CLERK_JWKS_URL
        value: https://clerk.exitblueprint.net/.well-known/jwks.json
      - key: CLERK_SECRET_KEY
        sync: false
      # Svix signing secret (whsec_...) for the Clerk webhook. Enables
      # POST /webhooks/clerk, which auto-provisions firms/advisors/owners on Clerk
      # events (docs/30 §5). Point the Clerk dashboard webhook at
      # https://api.exitblueprint.net/webhooks/clerk and paste its secret here.
      - key: CLERK_WEBHOOK_SIGNING_SECRET
        sync: false
      # Optional: enables real Claude narrative. All AI runs through the Vercel AI
      # Gateway (Anthropic-compatible Messages API) — we reach Anthropic through
      # Vercel, so there is no separate Anthropic key. Empty gateway balance → the
      # service falls back to the deterministic composer (reports still generate,
      # rule-based). Omit to ship rule-based. Get it from Vercel → AI Gateway → API keys.
      - key: AI_GATEWAY_API_KEY
        sync: false
      # Stripe billing (docs/24). STRIPE_SECRET_KEY (sk_...) enables checkout +
      # billing-portal sessions; STRIPE_WEBHOOK_SECRET (whsec_...) signature-verifies
      # POST /webhooks/stripe. Point the Stripe dashboard webhook at
      # https://api.exitblueprint.net/webhooks/stripe and paste its secret here.
      # Unset → billing endpoints reply 503 (the app runs comped).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # 'true' turns the server-side entitlement gate ON (gated functions require an
      # active/trialing/comped firm). Leave unset during the comped beta.
      - key: BILLING_ENFORCED
        sync: false
      # Shared secret for the continuous-evaluation webhooks (docs/07) that n8n calls
      # on a schedule (POST /webhooks/scheduled/*), sent as the x-webhook-secret
      # header. Unset → those endpoints reply 503.
      - key: WEBHOOK_SECRET
        sync: false
      # Rate limiting for the two unauthenticated webhook routes (/webhooks/clerk
      # and /webhooks/scheduled/*, docs/24 D2). Over the limit → 429 with Retry-After.
      # Optional; defaults are 60 requests / 60s per client IP. Render sets
      # X-Forwarded-For, so the limiter keys on the real client's first hop.
      - key: WEBHOOK_RATE_LIMIT
        sync: false
      - key: WEBHOOK_RATE_WINDOW_SEC
        sync: false
      # Per-IP limit for the authenticated function surface (/functions/v1/*),
      # checked before token verification. Optional; defaults 300 requests / 60s.
      # Raise for a NAT'd firm where many advisors share one egress IP.
      - key: API_RATE_LIMIT
        sync: false
      - key: API_RATE_WINDOW_SEC
        sync: false
      # Error monitoring (docs/32). Unset → disabled (no SDK active). SENTRY_ENVIRONMENT
      # and SENTRY_TRACES_SAMPLE_RATE are optional refinements.
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        sync: false
      # Comma-separated Clerk user ids allowed to load methodology from inside the
      # system (the superadmin-gated `seed-methodology` function — "Load methodology"
      # on /health). Unset → that endpoint replies 403. Lets a hosted beta seed
      # itself instead of running `npm run db:seed` with a production DATABASE_URL.
      - key: PLATFORM_SUPERADMIN_IDS
        sync: false
