<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Exit readiness platform for lower middle market business owners and the M&A advisors who guide them."
    />
    <meta name="theme-color" content="#1f2a24" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2316352a'/%3E%3Crect x='6' y='18' width='4.5' height='8' rx='1.5' fill='%23fff'/%3E%3Crect x='13.75' y='12' width='4.5' height='14' rx='1.5' fill='%23fff'/%3E%3Crect x='21.5' y='6' width='4.5' height='20' rx='1.5' fill='%23fff'/%3E%3C/svg%3E"
    />
    <title>ExitBlueprint</title>
    <script>
      // Set the theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('eb-theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
