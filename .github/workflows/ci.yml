name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply migrations to a fresh database
        run: npm run db:migrate
      - name: RLS firm-isolation test
        run: npm run test:rls
      - name: Seed (twice — proves idempotency)
        run: npm run db:seed && npm run db:seed
      - name: Demo tenant seed (twice — proves idempotency, validates vs reference scorer)
        run: npm run seed:demo && npm run seed:demo
      - name: Scoring engine tests (fixtures must match exactly)
        run: npm test
      - name: Extraction eval (fails on regression beyond tolerance)
        run: npm run eval
      - name: Build app
        run: npm run build
